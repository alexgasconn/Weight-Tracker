<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <!-- Full-bleed background for maskable (no rounded corners — shape applied by OS) -->
    <rect width="512" height="512" fill="#2563eb"/>
    <!-- Scale body — shrunk to fit safe zone (circle r=204, centered 256,256) -->
    <rect x="96" y="146" width="320" height="220" rx="44" fill="white"/>
    <!-- Digital display screen -->
    <rect x="168" y="174" width="176" height="90" rx="14" fill="#172554"/>
    <!-- Display: digit bars top row -->
    <rect x="188" y="192" width="36" height="10" rx="5" fill="#38bdf8"/>
    <rect x="232" y="192" width="36" height="10" rx="5" fill="#38bdf8"/>
    <rect x="188" y="210" width="36" height="10" rx="5" fill="#38bdf8"/>
    <rect x="232" y="210" width="36" height="10" rx="5" fill="#38bdf8"/>
    <!-- Decimal dot -->
    <circle cx="276" cy="211" r="6" fill="#7dd3fc"/>
    <!-- Right digit bars -->
    <rect x="288" y="192" width="36" height="10" rx="5" fill="#38bdf8"/>
    <rect x="288" y="210" width="36" height="10" rx="5" fill="#38bdf8"/>
    <!-- Bottom digit bars -->
    <rect x="188" y="228" width="36" height="10" rx="5" fill="#38bdf8"/>
    <rect x="288" y="228" width="36" height="10" rx="5" fill="#38bdf8"/>
    <!-- Non-slip surface lines -->
    <rect x="130" y="298" width="252" height="10" rx="5" fill="#bfdbfe"/>
    <rect x="130" y="320" width="252" height="10" rx="5" fill="#bfdbfe"/>
    <rect x="130" y="342" width="252" height="10" rx="5" fill="#bfdbfe"/>
</svg>
